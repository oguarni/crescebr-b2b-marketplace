name: E2E

# Optimized triggers: run ONLY on pull requests targeting main and on direct
# pushes to main. This deliberately avoids running on every feature-branch push
# to prevent concurrent E2E runs and keep CI cost/uptime low.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Serialize E2E per ref and cancel superseded runs so two pushes to the same PR
# never run the browser suite concurrently.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest

    # GitHub-hosted runner on purpose: the GCP VM (crescebr-e2e) is the manual /
    # local harness. CI runs here so it never spins up the VM, never collides
    # with a local run, and costs no VM uptime.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crescebr
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # NODE_ENV=development so the backend's `npm run dev` auto-migrates and
      # seeds the demo accounts the Playwright suite logs in with.
      NODE_ENV: development
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: crescebr
      JWT_SECRET: ci-e2e-secret
      # Zero-token policy. The app does not call any LLM today; these decoys make
      # the intent explicit and guarantee that if a provider SDK is ever wired in,
      # it cannot silently authenticate and spend tokens during automated CI.
      # The network-level guard in e2e/tests/fixtures.ts is the real enforcement.
      ANTHROPIC_API_KEY: disabled-no-llm-in-ci
      OPENAI_API_KEY: disabled-no-llm-in-ci
      CLAUDE_API_KEY: disabled-no-llm-in-ci

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install workspace dependencies
        run: npm ci

      - name: Build shared types
        run: npm run shared:build

      # The e2e project is standalone (not part of the npm workspaces), so it
      # installs separately — mirrors scripts/gcp/run-e2e.sh.
      - name: Install E2E dependencies
        working-directory: e2e
        run: npm install

      - name: Install Playwright browser (chromium)
        working-directory: e2e
        run: npm run install:browsers

      # Playwright boots the backend (migrate + seed + server) and the Vite dev
      # server itself via its webServer config, runs headless, then tears them
      # down. CI=true (set automatically by GitHub Actions) makes Playwright
      # start fresh servers and forbid `.only`.
      - name: Run Playwright E2E
        working-directory: e2e
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
